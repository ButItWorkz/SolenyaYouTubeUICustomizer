<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; width: 250px; padding: 15px; background: #181818; color: #fff; }
    h3 { margin-top: 0; color: #f1f1f1; border-bottom: 1px solid #333; padding-bottom: 5px; }
    .control-group { margin-bottom: 12px; }
    .master-switch { background: #2a2a2a; padding: 10px; border-radius: 6px; border: 1px solid #444; margin-bottom: 15px; }
    label { display: flex; align-items: center; justify-content: space-between; font-size: 14px; cursor: pointer;}
    .master-label { font-weight: bold; color: #00ff88; }
    input[type="number"] { width: 50px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 3px; text-align: center;}
    input[type="checkbox"] { cursor: pointer; transform: scale(1.2); }
  </style>
</head>
<body>
  <div class="control-group master-switch">
    <label class="master-label">Enable Override
      <input type="checkbox" id="masterToggle">
    </label>
  </div>

  <h3>Grid Settings</h3>
  
  <div class="control-group">
    <label>Thumbnails per row:
      <input type="number" id="gridCount" min="1" max="10" value="6">
    </label>
  </div>

  <hr style="border-color: #333;">
  <h3>Content Filters</h3>

  <div class="control-group">
    <label>Show Shorts
      <input type="checkbox" id="showShorts">
    </label>
  </div>
  <div class="control-group">
    <label>Show Playables (Games)
      <input type="checkbox" id="showGames">
    </label>
  </div>
  <div class="control-group">
    <label>Show Community Posts
      <input type="checkbox" id="showPosts">
    </label>
  </div>
  <div class="control-group">
    <label>Show Explore Section
      <input type="checkbox" id="showExplore">
    </label>
  </div>
  <div class="control-group">
    <label>Show AI Beta (Ask for videos)
      <input type="checkbox" id="showBeta">
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
